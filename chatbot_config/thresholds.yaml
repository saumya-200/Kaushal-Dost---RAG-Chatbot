# Static lookup (Stage 0)
static_lookup:
  enabled: true
  fuzzy_threshold: 0.80        # difflib SequenceMatcher ratio for fuzzy matching

# Scope detection (Stage 1)
scope:
  enabled: true
  similarity_threshold: 0.45   # Below this → out of scope
  anti_scope_keywords:         # Instant rejection (substring match)
    - "recipe"
    - "cricket"
    - "movie"
    - "capital of"
    - "prime minister"
    - "president of"
    - "weather"
    - "quantum"
    - "stock market"

# Retrieval confidence thresholds (Stage 3)
retrieval:
  high_confidence: 0.88       # Above this → return FAISS result directly (extractive)
  medium_confidence: 0.62     # Between 0.62–0.88 → send to LLM with retrieved context
  low_confidence: 0.62        # Below this → return fallback message
  confidence_weights:          # Multi-signal confidence scorer
    top_score: 0.50
    score_gap: 0.30
    avg_top_k: 0.20

# Semantic cache (Stage 2)
cache:
  similarity_threshold: 0.92  # Cosine similarity to consider a cache hit
  ttl_seconds: 3600           # Cache entries expire after 1 hour
  max_entries: 10000          # Max cached query-response pairs

# LLM concurrency (Stage 4)
llm:
  max_concurrent: 4           # asyncio.Semaphore cap
  queue_size: 100             # Max queued requests before rejecting
  timeout_seconds: 75         # Per-request timeout for Ollama
  primary_model: "qwen3:0.6b"
  fallback_model: "qwen3:1.7b"

# Response constraints
response:
  max_words: 120              # Hard cap on response length
  max_context_chunks: 3       # Top-k chunks sent to LLM
  max_history_turns: 4        # Conversation history depth

# Chunking
chunking:
  chunk_size_tokens: 500
  chunk_overlap_tokens: 50
